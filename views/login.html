<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Connexion | Admin KESTIO</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-body admin-login-body">
<main class="admin-login-wrap">
  <div class="admin-login-card">
    <a href="/" class="admin-login-logo"><img src="/img/logo/kestio-noir.png" alt="KESTIO"></a>
    <h1>Espace administration</h1>
    <p class="admin-login-sub">Accès réservé aux administrateurs du site de certification.</p>
    {{{error_html}}}
    <form method="POST" action="/admin/login">
      <input type="hidden" name="_csrf" value="{{csrfToken}}">
      <div class="fgrp"><label for="email">Email</label><input class="finp" type="email" id="email" name="email" autocomplete="username" required></div>
      <div class="fgrp"><label for="password">Mot de passe</label><input class="finp" type="password" id="password" name="password" autocomplete="current-password" required></div>
      <button type="submit" class="btn-bl btn-full">Se connecter</button>
    </form>
    <p class="admin-login-foot"><a href="/">← Retour au site public</a></p>
  </div>
</main>
</body>
</html>
