<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Changer mon mot de passe | Admin KESTIO</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-body">

<header class="admin-header">
  <div class="admin-header-in">
    <a href="/admin" class="admin-logo"><img src="/img/logo/kestio-noir.png" alt="KESTIO"></a>
    <nav class="admin-nav">
      <a href="/admin/sessions">Sessions inter</a>
      <a href="/admin/users">Utilisateurs</a>
      <a href="/admin/activity">Journal</a>
    </nav>
    <div class="admin-user">
      <span class="admin-user-name">{{displayName}}</span>
      <form method="POST" action="/admin/logout" class="inline-form">
        <input type="hidden" name="_csrf" value="{{csrfToken}}">
        <button type="submit" class="btn-sm btn-logout">Se déconnecter</button>
      </form>
    </div>
  </div>
</header>

<main class="admin-main admin-narrow">
  <div class="ey">Sécurité</div>
  <h1>Changer mon mot de passe</h1>
  <p class="admin-sub">Connecté en tant que <strong>{{email}}</strong>.</p>

  {{{forced_html}}}
  {{{error_html}}}

  <form method="POST" action="/admin/change-password" class="admin-form">
    <input type="hidden" name="_csrf" value="{{csrfToken}}">
    <div class="fgrp">
      <label for="current_password">Mot de passe actuel *</label>
      <input class="finp" type="password" id="current_password" name="current_password" autocomplete="current-password" required>
    </div>
    <div class="fgrp">
      <label for="new_password">Nouveau mot de passe *</label>
      <input class="finp" type="password" id="new_password" name="new_password" autocomplete="new-password" required minlength="10">
      <p class="fhelp">Minimum 10 caractères, avec au moins une majuscule, une minuscule et un chiffre.</p>
    </div>
    <div class="fgrp">
      <label for="confirm_password">Confirmer le nouveau mot de passe *</label>
      <input class="finp" type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required minlength="10">
    </div>
    <div class="admin-form-actions">
      <button type="submit" class="btn-bl">Mettre à jour</button>
    </div>
  </form>
</main>
</body>
</html>
